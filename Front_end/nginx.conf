# =========================================================
# 80 端口：HTTP 全部 301 跳转到 HTTPS
# =========================================================
server {
    listen 80;
    server_name dailfinance.top www.dailfinance.top;

    # Let's Encrypt / 证书续签校验保留
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# =========================================================
# 443 端口：正式站点（HTTPS）
# =========================================================
server {
    listen 443 ssl;
    http2 on;
    server_name dailfinance.top www.dailfinance.top;

    ssl_certificate     /etc/nginx/ssl/dailfinance.top_bundle.crt;
    ssl_certificate_key /etc/nginx/ssl/dailfinance.top.key;
    ssl_session_timeout 10m;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-RSA-AES128-GCM-SHA256:HIGH:!aNULL:!MD5:!RC4:!DHE;
    ssl_prefer_server_ciphers on;

    client_max_body_size 100m;

    root /usr/share/nginx/html;
    index index.html;

    # SPA：找不到文件时回落到 index.html，由 vue-router 处理
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 反向代理后端 API（容器名 backend，所有后端路由都以 /api 开头）
    # 使用 ^~ 优先前缀匹配，避免被下方静态资源正则 location 抢走
    # （否则像 /api/assets/{id}/qrcode.png 这种以 .png 结尾的 API 请求
    #  会被静态资源 location 接管，导致 nginx 在本地找不到文件而返回 404）
    location ^~ /api/ {
        proxy_pass         http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # 后端 Swagger 文档（生产可视情况关闭）
    location = /docs {
        proxy_pass         http://backend:8000/docs;
        proxy_set_header   Host              $host;
    }
    location = /openapi.json {
        proxy_pass         http://backend:8000/openapi.json;
        proxy_set_header   Host              $host;
    }

    # 静态资源缓存
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 7d;
        access_log off;
        add_header Cache-Control "public, max-age=604800, immutable";
    }
}
