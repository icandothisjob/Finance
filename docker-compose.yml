services:
  mysql:
    image: mysql:8.0
    container_name: asset-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    volumes:
      - ./mysql_data:/var/lib/mysql
      - ./Back_end/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    # 端口仅在内部网络可用，不映射到宿主机；如需本机连数据库，把下面两行取消注释
    # ports:
    #   - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./Back_end
      dockerfile: Dockerfile
    image: asset-backend:latest
    container_name: asset-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}

      APP_HOST: 0.0.0.0
      APP_PORT: 8000

      CORS_ORIGINS: ${CORS_ORIGINS}

      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: 1440

      DEFAULT_ADMIN_USERNAME: ${DEFAULT_ADMIN_USERNAME}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD}

      ORG_CODE: ${ORG_CODE}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}

      COS_SECRET_ID: ${COS_SECRET_ID}
      COS_SECRET_KEY: ${COS_SECRET_KEY}
      COS_REGION: ${COS_REGION}
      COS_BUCKET: ${COS_BUCKET}
      COS_DOMAIN: ${COS_DOMAIN}
      COS_PREFIX: ${COS_PREFIX}
      UPLOAD_MAX_SIZE_MB: ${UPLOAD_MAX_SIZE_MB}

      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      DASHSCOPE_BASE_URL: ${DASHSCOPE_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      DASHSCOPE_MODEL: ${DASHSCOPE_MODEL:-qwen-plus}
      IMPORT_MAX_ROWS: ${IMPORT_MAX_ROWS:-500}
    expose:
      - "8000"

  frontend:
    build:
      context: ./Front_end
      dockerfile: Dockerfile
    image: asset-frontend:latest
    container_name: asset-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${WEB_PORT:-80}:80"
